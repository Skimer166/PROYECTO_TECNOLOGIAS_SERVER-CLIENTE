name: Selenium E2E Tests

on:
  pull_request:
    branches:
      - '**'
    paths:
      - 'Frontend/Market-AI/selenium/**'
      - 'Frontend/Market-AI/jest.e2e.config.js'
      - 'Frontend/Market-AI/src/**'

jobs:
  e2e-selenium:
    name: Selenium E2E Frontend
    runs-on: windows-latest

    defaults:
      run:
        working-directory: ./Frontend/Market-AI

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Start Angular dev server en background
        run: Start-Process -NoNewWindow npx -ArgumentList "ng serve --host 0.0.0.0"
        shell: pwsh

      - name: Esperar a que Angular esté listo en el puerto 4200
        run: |
          $timeout = 90
          $elapsed = 0
          Write-Host "Esperando Angular en http://localhost:4200..."
          while ($elapsed -lt $timeout) {
            try {
              Invoke-WebRequest -Uri "http://localhost:4200" -UseBasicParsing -ErrorAction Stop | Out-Null
              Write-Host "Angular listo"
              break
            } catch {
              Start-Sleep -Seconds 3
              $elapsed += 3
            }
          }
        shell: pwsh

      - name: Ejecutar pruebas Selenium
        run: npm run selenium
        env:
          BACKEND_URL: https://market-ai-api.onrender.com

      - name: Subir reporte de resultados
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-results
          path: Frontend/Market-AI/selenium-results/
          retention-days: 7
