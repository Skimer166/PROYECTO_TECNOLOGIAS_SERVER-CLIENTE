name: Selenium E2E Tests

on:
  pull_request:
    branches:
      - '**'
    paths:
      - 'Frontend/Market-AI/selenium/**'
      - 'Frontend/Market-AI/jest.e2e.config.js'
      - 'Frontend/Market-AI/src/**'

jobs:
  e2e-selenium:
    name: Selenium E2E Frontend
    runs-on: windows-latest

    defaults:
      run:
        working-directory: ./Frontend/Market-AI

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build Angular (browser SPA)
        run: npx ng build --configuration=development 2>&1
        shell: bash

      - name: Start static file server
        run: nohup npx http-server dist/Market-AI/browser -p 4200 --spa -c-1 --cors > /tmp/server.log 2>&1 &
        shell: bash

      - name: Esperar a que el servidor este listo
        run: |
          elapsed=0
          until curl -s http://localhost:4200 > /dev/null 2>&1; do
            echo "Esperando servidor... ($elapsed s)"
            sleep 3
            elapsed=$((elapsed + 3))
            if [ $elapsed -ge 60 ]; then
              echo "Servidor no inicio. Log:"
              cat /tmp/server.log || true
              exit 1
            fi
          done
          echo "Servidor listo despues de $elapsed segundos"
        shell: bash

      - name: Ejecutar pruebas Selenium
        run: npm run selenium
        env:
          BACKEND_URL: https://market-ai-api.onrender.com
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}

      - name: Subir reporte de resultados
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-results
          path: Frontend/Market-AI/selenium-results/
          retention-days: 7
