name: Selenium E2E Tests

on:
  pull_request:
    branches:
      - '**'
    paths:
      - 'Frontend/Market-AI/selenium/**'
      - 'Frontend/Market-AI/jest.e2e.config.js'
      - 'Frontend/Market-AI/src/**'

jobs:
  e2e-selenium:
    name: Selenium E2E Frontend
    runs-on: windows-latest

    defaults:
      run:
        working-directory: ./Frontend/Market-AI

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Start Angular dev server en background
        run: nohup npx ng serve --host 0.0.0.0 --port 4200 > /tmp/angular.log 2>&1 &
        shell: bash

      - name: Esperar a que Angular compile y esté listo
        run: |
          timeout=300
          elapsed=0
          echo "Esperando que Angular compile completamente..."
          until grep -q "Compiled successfully\|compiled successfully\|Application bundle generation complete\|Local:" /tmp/angular.log 2>/dev/null; do
            echo "Compilando... ($elapsed s)"
            sleep 5
            elapsed=$((elapsed + 5))
            if [ $elapsed -ge $timeout ]; then
              echo "Angular no compilo en $timeout segundos. Log:"
              cat /tmp/angular.log || true
              exit 1
            fi
          done
          echo "Angular compilado despues de $elapsed segundos"
          echo "Ultimas lineas del log:"
          tail -5 /tmp/angular.log
          echo "Esperando 10s adicionales para que el servidor este estable..."
          sleep 10
        shell: bash

      - name: Ejecutar pruebas Selenium
        run: npm run selenium
        env:
          BACKEND_URL: https://market-ai-api.onrender.com
          USER_EMAIL: ${{ secrets.USER_EMAIL }}
          USER_PASSWORD: ${{ secrets.USER_PASSWORD }}

      - name: Subir reporte de resultados
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-results
          path: Frontend/Market-AI/selenium-results/
          retention-days: 7
