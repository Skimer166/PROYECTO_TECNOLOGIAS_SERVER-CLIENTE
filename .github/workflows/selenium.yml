name: Selenium E2E Tests

on:
  pull_request:
    branches:
      - '**'
    paths:
      - 'Frontend/Market-AI/selenium/**'
      - 'Frontend/Market-AI/jest.e2e.config.js'
      - 'Frontend/Market-AI/src/**'

jobs:
  e2e-selenium:
    name: Selenium E2E Frontend
    runs-on: windows-latest

    defaults:
      run:
        working-directory: ./Frontend/Market-AI

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Start Angular dev server en background
        run: nohup npx ng serve --host 0.0.0.0 --port 4200 > /tmp/angular.log 2>&1 &
        shell: bash

      - name: Esperar a que Angular esté listo en el puerto 4200
        run: |
          timeout=240
          elapsed=0
          echo "Esperando Angular en http://localhost:4200..."
          until curl -s http://localhost:4200 > /dev/null 2>&1; do
            echo "Esperando... ($elapsed s)"
            sleep 5
            elapsed=$((elapsed + 5))
            if [ $elapsed -ge $timeout ]; then
              echo "Angular no inicio en $timeout segundos. Log:"
              cat /tmp/angular.log || true
              exit 1
            fi
          done
          echo "Angular listo despues de $elapsed segundos"
        shell: bash

      - name: Ejecutar pruebas Selenium
        run: npm run selenium
        env:
          BACKEND_URL: https://market-ai-api.onrender.com

      - name: Subir reporte de resultados
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-results
          path: Frontend/Market-AI/selenium-results/
          retention-days: 7
