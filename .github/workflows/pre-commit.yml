name: Pre-Commit Checks

on:
  pull_request:
    branches:
      - '**'

jobs:
  lint:
    name: ESLint & Format Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Backend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './Backend/package.json'

      - name: Install dependencies
        run: npm i

      - name: Run ESLint
        run: npx eslint src/ --max-warnings=0
      - name: TypeScript type check
        run: npx tsc --noEmit

  lint-frontend:
    name: Angular ESLint Check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./Frontend/Market-AI

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: './Frontend/Market-AI/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run Angular ESLint
        run: npx ng lint
