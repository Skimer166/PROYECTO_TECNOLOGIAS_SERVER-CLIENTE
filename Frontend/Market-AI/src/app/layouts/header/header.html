<mat-toolbar color="primary" class="header-toolbar">
  <div class="left-section">
    <button mat-icon-button [routerLink]="['/']" aria-label="Ir al inicio" class="logo-btn">
      <img src="assets/logo.jpeg" alt="Logo Market AI" class="app-logo">
    </button>
    
    <span class="brand">Market AI</span>
  </div>

  <span class="spacer"></span>

  <nav class="center-nav">
    @if (isLoggedIn) {
      <a mat-button routerLink="/home-page" routerLinkActive="active-link">Panel</a>
      <a mat-button routerLink="/mis-agentes" routerLinkActive="active-link">Mis Agentes</a>
      <a mat-button routerLink="/mi-perfil" routerLinkActive="active-link">Mi Perfil</a>
    } @else if (isLandingPage) {
      <a mat-button [routerLink]="['/landing-page']" fragment="inicio">Inicio</a>
      <a mat-button [routerLink]="['/landing-page']" fragment="precios">Precios</a>
      <a mat-button [routerLink]="['/landing-page']" fragment="servicios">Servicios</a>
    }
  </nav>

  <span class="spacer"></span>

  <div class="right-section">
    @if (isLoggedIn) {
      
      <button mat-stroked-button class="recharge-btn" (click)="openRechargeDialog()">
        <mat-icon>add</mat-icon> Recargar
      </button>
      
      <div class="credits-badge" title="Tus créditos disponibles">
        <mat-icon class="coin-icon">monetization_on</mat-icon>
        <span>{{ userCredits || 0 }}</span>
      </div>

      <div class="user-badge" *ngIf="userName">
        @if (userPhoto) {
          <img [src]="userPhoto" alt="Foto" class="mini-avatar" />
        }
        <span class="mini-name">{{ userName }}</span>
      </div>

      <button mat-stroked-button color="accent" (click)="logout()">
        Salir
      </button>

    } @else {
      <button mat-flat-button color="accent" [routerLink]="['/login']">
        Iniciar sesión
      </button>
    }
  </div>
</mat-toolbar>
