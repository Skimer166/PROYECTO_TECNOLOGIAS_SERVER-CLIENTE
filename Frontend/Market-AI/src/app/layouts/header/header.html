<mat-toolbar color="primary" class="header-toolbar">
  
  <div class="left-section">
    <button mat-icon-button [matMenuTriggerFor]="mobileMenu" class="mobile-menu-btn">
      <mat-icon>menu</mat-icon>
    </button>

    <button mat-icon-button [routerLink]="['/']" aria-label="Ir al inicio" class="logo-btn">
      <img src="assets/logo.jpeg" alt="Logo" class="app-logo">
    </button>
    
    <span class="brand">Market AI</span>
  </div>

  <nav class="center-nav desktop-only">
    @if (isLoggedIn) {
      <a mat-button routerLink="/home-page" routerLinkActive="active-link">Panel</a>
      <a mat-button routerLink="/mis-agentes" routerLinkActive="active-link">Mis Agentes</a>
      <a mat-button routerLink="/mi-perfil" routerLinkActive="active-link">Mi Perfil</a>
    } @else if (isLandingPage) {
      <a mat-button [routerLink]="['/landing-page']" fragment="inicio">Inicio</a>
      <a mat-button [routerLink]="['/landing-page']" fragment="precios">Precios</a>
      <a mat-button [routerLink]="['/landing-page']" fragment="servicios">Servicios</a>
    }
  </nav>

  <span class="spacer"></span>

  <div class="right-section">
    @if (isLoggedIn) {
      
      <button mat-stroked-button class="recharge-btn desktop-only" (click)="openRechargeDialog()">
        <mat-icon>add</mat-icon> Recargar
      </button>
      
      <div class="credits-badge" title="Créditos">
        <mat-icon class="coin-icon">monetization_on</mat-icon>
        <span>{{ userCredits || 0 }}</span>
      </div>

      <div class="user-badge" *ngIf="userName" routerLink="/mi-perfil">
        @if (userPhoto) {
          <img [src]="userPhoto" alt="Foto" class="mini-avatar" />
        } @else {
          <mat-icon>account_circle</mat-icon>
        }
        <span class="mini-name desktop-only">{{ userName }}</span>
      </div>

      <button mat-stroked-button color="accent" class="desktop-only logout-btn" (click)="logout()">
        Salir
      </button>

    } @else {
      <button mat-flat-button color="accent" [routerLink]="['/login']">
        Ingresar
      </button>
    }
  </div>
</mat-toolbar>

<mat-menu #mobileMenu="matMenu" class="custom-mobile-menu">
  @if (isLoggedIn) {
    <button mat-menu-item routerLink="/home-page">
      <mat-icon>dashboard</mat-icon> Panel
    </button>
    <button mat-menu-item routerLink="/mis-agentes">
      <mat-icon>smart_toy</mat-icon> Mis Agentes
    </button>
    <button mat-menu-item routerLink="/mi-perfil">
      <mat-icon>person</mat-icon> Mi Perfil
    </button>
    
    <mat-divider></mat-divider>
    
    <button mat-menu-item (click)="openRechargeDialog()">
      <mat-icon class="text-gold">add_circle</mat-icon> Recargar Créditos
    </button>
    <button mat-menu-item (click)="logout()">
      <mat-icon color="warn">logout</mat-icon> Cerrar Sesión
    </button>

  } @else {
    <button mat-menu-item [routerLink]="['/landing-page']" fragment="inicio">Inicio</button>
    <button mat-menu-item [routerLink]="['/landing-page']" fragment="precios">Precios</button>
    <button mat-menu-item [routerLink]="['/landing-page']" fragment="servicios">Servicios</button>
    <mat-divider></mat-divider>
    <button mat-menu-item routerLink="/login">
      <mat-icon>login</mat-icon> Iniciar Sesión
    </button>
  }
</mat-menu>
