@if (isLoggedIn && !isOpen) {
  <button
    mat-fab color="primary"
    class="support-fab"
    (click)="toggleChat()">
    <mat-icon>support_agent</mat-icon>
  </button>
}

@if (isOpen) {
  <div class="support-chat-window">
    <div class="chat-header">
      <span>Soporte Técnico</span>
      <button mat-icon-button (click)="toggleChat()">
        <mat-icon>close</mat-icon>
      </button>
    </div>
    <div class="chat-body" #scrollContainer>
      @for (msg of messages; track msg) {
        <div
          class="message-row"
          [ngClass]="{'system': msg.isSystem, 'me': msg.sender === userName, 'other': msg.sender !== userName && !msg.isSystem}">
          @if (msg.isSystem) {
            <span class="system-msg">{{ msg.text }}</span>
          }
          @if (!msg.isSystem) {
            <div class="bubble">
              @if (msg.sender !== userName) {
                <small class="sender-name">{{ msg.sender }}</small>
              }
              <p>{{ msg.text }}</p>
            </div>
          }
        </div>
      }
    </div>
    <div class="chat-footer">
      <input [(ngModel)]="newMessage" (keyup.enter)="sendMessage()" placeholder="Escribe tu duda..." />
      <button mat-mini-fab color="accent" (click)="sendMessage()" [disabled]="!newMessage.trim()">
        <mat-icon>send</mat-icon>
      </button>
    </div>
  </div>
}
